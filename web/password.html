<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <title>Passord — Parkno</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Denne siden er passordbeskyttet.">
  <meta name="theme-color" content="#FCFDFC" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0C1110" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="icon" href="assets/parkno-logo-icon.png">

  <style>
    /* ============================================================
       PARKNO · Passord — "AirGlass"
       Soft single-shared-password gate. Vanilla HTML/CSS/JS.
       NOTE: client-side only — not real security. Keeps casual
       visitors out of a private preview, nothing more.
       ============================================================ */
    :root {
      --bg-1:#FCFDFC; --bg-2:#F3F7F4; --bg-3:#E9F3F3;
      --blob-a:#B5F3D7; --blob-b:#B6CDF8; --blob-c:#93D6E3;
      --ink:#17211F; --ink-2:#34413E; --ink-3:#73817D;
      --accent:#4EA7B9; --accent-2:#8BCFB0; --coral:#EF8F7A;
      --card-bg:rgba(255,255,255,0.80); --card-bd:rgba(255,255,255,0.92);
      --field-bg:rgba(255,255,255,0.90); --field-bd:rgba(23,33,31,0.10); --field-bg-focus:#fff;
      --btn-bg:#17211F; --btn-fg:#fff; --btn-shadow:0 14px 30px rgba(23,33,31,0.22);
      --hairline:rgba(23,33,31,0.10); --glow:rgba(78,167,185,0.18);
      --danger:#D6584A;
      --spring:cubic-bezier(.2,.9,.25,1.25); --ease:cubic-bezier(.2,.7,.2,1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-1:#0C1110; --bg-2:#0F1614; --bg-3:#0A1417;
        --blob-a:#123A2C; --blob-b:#14233F; --blob-c:#103840;
        --ink:#F3F7F4; --ink-2:#C3CEC9; --ink-3:#8A9692;
        --card-bg:rgba(22,30,28,0.52); --card-bd:rgba(255,255,255,0.10);
        --field-bg:rgba(255,255,255,0.06); --field-bd:rgba(255,255,255,0.14); --field-bg-focus:rgba(255,255,255,0.12);
        --btn-bg:linear-gradient(135deg,#4EA7B9 0%,#8BCFB0 100%); --btn-fg:#06120F; --btn-shadow:0 14px 34px rgba(78,167,185,0.34);
        --hairline:rgba(255,255,255,0.12); --glow:rgba(78,167,185,0.28);
        --danger:#F08A7C;
      }
    }
    * { box-sizing:border-box; }
    html, body {
      margin:0; min-height:100%; overflow-x:hidden;
      background:linear-gradient(168deg,var(--bg-1) 0%,var(--bg-2) 60%,var(--bg-3) 100%);
      background-attachment:fixed; color:var(--ink);
      font-family:Inter,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    }
    :focus-visible { outline:3px solid color-mix(in srgb,var(--accent) 65%,transparent); outline-offset:3px; border-radius:4px; }

    /* Ambient brand wash */
    .blobs { position:fixed; inset:0; z-index:0; pointer-events:none; filter:blur(70px); opacity:.55; }
    .blobs i { position:absolute; display:block; border-radius:50%; }
    .blobs .a { width:42vw; height:42vw; left:-10vw; top:-12vh; background:var(--blob-a); }
    .blobs .b { width:38vw; height:38vw; right:-12vw; top:8vh; background:var(--blob-b); }
    .blobs .c { width:46vw; height:46vw; left:18vw; bottom:-22vh; background:var(--blob-c); }

    .wrap { position:relative; z-index:1; min-height:100dvh; display:grid; place-items:center; padding:24px; }

    .card {
      width:100%; max-width:420px; padding:32px 28px 28px;
      background:var(--card-bg); border:1px solid var(--card-bd); border-radius:24px;
      backdrop-filter:blur(22px) saturate(140%); -webkit-backdrop-filter:blur(22px) saturate(140%);
      box-shadow:0 30px 60px rgba(23,33,31,0.16); text-align:center;
    }
    .logo { width:54px; height:54px; border-radius:15px; margin:0 auto 18px; display:block; box-shadow:0 8px 20px rgba(23,33,31,.18); }
    h1 { margin:0 0 6px; font-size:22px; font-weight:700; letter-spacing:-0.4px; }
    .sub { margin:0 0 22px; font-size:14px; line-height:1.5; color:var(--ink-3); }

    form { display:flex; flex-direction:column; gap:12px; }
    .field { position:relative; }
    input[type=password], input[type=text] {
      width:100%; height:52px; padding:0 48px 0 16px; font-size:16px; color:var(--ink);
      background:var(--field-bg); border:1.5px solid var(--field-bd); border-radius:14px;
      transition:border-color .2s var(--ease), background .2s var(--ease);
      font-family:inherit;
    }
    input::placeholder { color:var(--ink-3); }
    input:focus { outline:none; background:var(--field-bg-focus); border-color:var(--accent); box-shadow:0 0 0 4px var(--glow); }
    input.err { border-color:var(--danger); }
    .reveal {
      position:absolute; right:8px; top:50%; transform:translateY(-50%);
      width:36px; height:36px; border:0; background:transparent; cursor:pointer;
      color:var(--ink-3); display:grid; place-items:center; border-radius:9px;
    }
    .reveal:hover { color:var(--ink); }

    button.submit {
      height:52px; margin-top:4px; border:0; border-radius:14px; cursor:pointer;
      font-size:16px; font-weight:650; color:var(--btn-fg); background:var(--btn-bg);
      box-shadow:var(--btn-shadow); transition:transform .15s var(--spring), filter .2s var(--ease);
      font-family:inherit;
    }
    button.submit:hover { filter:brightness(1.05); }
    button.submit:active { transform:scale(0.98); }

    .msg { min-height:18px; margin-top:4px; font-size:13px; font-weight:550; color:var(--danger); }
    .msg.hidden { visibility:hidden; }

    .foot { margin-top:18px; font-size:12px; color:var(--ink-3); }
    .foot a { color:var(--accent); text-decoration:none; }
    .foot a:hover { text-decoration:underline; }

    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
    .shake { animation:shake .4s var(--ease); }
  </style>
</head>
<body>
  <div class="blobs"><i class="a"></i><i class="b"></i><i class="c"></i></div>

  <main class="wrap">
    <section class="card" id="card">
      <img class="logo" src="assets/parkno-logo-icon.png" alt="Parkno">
      <h1>Passordbeskyttet</h1>
      <p class="sub">Denne siden er privat. Skriv inn passordet for å fortsette.</p>

      <form id="form" autocomplete="off" novalidate>
        <div class="field">
          <input id="pw" type="password" inputmode="text" placeholder="Passord"
                 autocomplete="current-password" aria-label="Passord" autofocus>
          <button type="button" class="reveal" id="reveal" aria-label="Vis passord" title="Vis passord">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <button type="submit" class="submit">Lås opp</button>
        <p class="msg hidden" id="msg" role="alert">Feil passord. Prøv igjen.</p>
      </form>

      <p class="foot">Trenger du tilgang? <a href="mailto:kontakt@parkno.no">Kontakt oss</a></p>
    </section>
  </main>

  <script>
  (function () {
    'use strict';

    // ── Configuration ────────────────────────────────────────────
    // Shared preview password. Change this value to rotate it.
    // SHA-256 is used only to keep the literal out of plain view — this is
    // a soft gate, not real security. Anyone can read the page source.
    var PASSWORD_HASH = 'd992e836e35080cb97daa958ceab21aedc6d0de046aee7632a4eeaef8be03840'; // "parkno2026"
    var REDIRECT_TO   = 'index.html';   // where to send the user once unlocked
    var STORAGE_KEY   = 'parkno_unlocked';

    var form   = document.getElementById('form');
    var pw     = document.getElementById('pw');
    var msg    = document.getElementById('msg');
    var card   = document.getElementById('card');
    var reveal = document.getElementById('reveal');

    // Already unlocked this session? Skip straight through.
    try {
      if (sessionStorage.getItem(STORAGE_KEY) === '1') {
        location.replace(REDIRECT_TO);
        return;
      }
    } catch (e) { /* sessionStorage blocked — just show the form */ }

    async function sha256(text) {
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(function (b) {
        return b.toString(16).padStart(2, '0');
      }).join('');
    }

    reveal.addEventListener('click', function () {
      var show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      reveal.setAttribute('aria-label', show ? 'Skjul passord' : 'Vis passord');
      pw.focus();
    });

    function fail() {
      msg.classList.remove('hidden');
      pw.classList.add('err');
      card.classList.remove('shake');
      void card.offsetWidth;        // restart animation
      card.classList.add('shake');
      pw.select();
    }

    pw.addEventListener('input', function () {
      msg.classList.add('hidden');
      pw.classList.remove('err');
    });

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      var value = pw.value;
      if (!value) { fail(); return; }
      var hash;
      try {
        hash = await sha256(value);
      } catch (err) {
        // crypto.subtle requires a secure context (https/localhost).
        msg.textContent = 'Kan ikke verifisere passord i denne nettleseren.';
        msg.classList.remove('hidden');
        return;
      }
      if (hash === PASSWORD_HASH) {
        try { sessionStorage.setItem(STORAGE_KEY, '1'); } catch (e) {}
        location.replace(REDIRECT_TO);
      } else {
        fail();
      }
    });
  })();
  </script>
  <!-- Vercel Web Analytics -->
  <script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
